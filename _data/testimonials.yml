- name: "MD Masfiqur Rahman"
  body: |
    I had the pleasure of working with Rafael Hurpia da Rocha at The SilverLogic for over eight years, and I can confidently say he is one of the most talented Full-Stack and DevOps engineers I've worked with.

    Rafael specializes in Python, Django, React, Linux, Docker, Git, Jenkins, security best practices (including OWASP), Sentry, Rundeck, and Jekyll. His technical expertise, combined with his problem-solving mindset, consistently resulted in robust, scalable, and high-quality solutions for a wide range of client projects.

    What impressed me most was his commitment to advanced development practices and DevOps culture. He always emphasized clean architecture, automation, security, and continuous improvement while collaborating effectively with the team. Beyond his technical skills, Rafael was always willing to share his knowledge, and I personally learned a great deal from him throughout the years we worked together.

    Rafael is not only an outstanding engineer but also a dependable teammate who genuinely cares about delivering the best possible outcome for clients. He would be a tremendous asset to any organization, and I would welcome the opportunity to work with him again in the future. I highly recommend Rafael without any hesitation.

- name: "Diego Campos"
  body: |
    I had the privilege of working with Rafael for several years and learned a great deal from him.

    He combines strong technical expertise with a genuine willingness to help others grow. Through code reviews, technical discussions, and day-to-day collaboration, he consistently elevated the team and shared his knowledge generously.

    Beyond being an excellent engineer, Rafael is a supportive, approachable, and thoughtful colleague. I would gladly recommend him to any team looking for both technical excellence and a great teammate.

- name: "Samuel Jansem"
  body: |
    I had the pleasure of working with Rafael, and he's a strong, dependable engineer who consistently raises the quality of the work around him. He has deep knowledge of the stack and a real talent for solving difficult problems quickly and correctly. He's also a great teammate. He's always willing to help, and people learn a lot just from working with him. Any team would be lucky to have him, and I recommend him without hesitation.

- name: "Rodean Fraser"
  body: |
    I had the privilege of working alongside Rafael at The Silver Logic, and I can confidently say he is one of the most knowledgeable and impactful engineers I have worked with.

    As a senior engineer, Rafael consistently demonstrated deep technical expertise, particularly in DevOps, system architecture, and building robust, fault-tolerant systems. His ability to design scalable and resilient solutions gave our team confidence that the systems we built could perform reliably under real-world demands.

    What truly sets Rafael apart, however, is his willingness to share his knowledge. He is incredibly generous with his time and always eager to pair program, walk through complex problems, and help teammates grow. No matter how busy he was, he made himself available to mentor others and ensure the entire team succeeded. His collaborative approach fostered a culture of learning and continuous improvement that benefited everyone around him.

    Beyond his technical excellence, Rafael is selfless, approachable, and deeply invested in the success of his teammates. Any organization would be fortunate to have an engineer and leader of his caliber, and I would welcome the opportunity to work with him again in the future.

- name: "Lúcio Bartolomeu Junqueira"
  body: |
    Working with Rafael was one of the greatest opportunities and pleasures of my career.

    Rafael is committed, knowledgeable, kind, and proactive. He is an excellent communicator who consistently strives to improve the projects and environments he is part of. He set the bar in several aspects of our work, and I was fortunate to consider him a mentor. I learned a great deal from him, and I would consider it an honor to collaborate with him again on any future endeavor.

    I have no doubt he will thrive and succeed in whatever he takes on, and I look forward to following his journey.
